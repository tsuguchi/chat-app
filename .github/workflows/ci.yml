name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Lint / Type / Format / Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check if Next.js project is initialized
        id: check
        run: |
          if [ -f package.json ]; then
            echo "initialized=true" >> "$GITHUB_OUTPUT"
          else
            echo "initialized=false" >> "$GITHUB_OUTPUT"
            echo "::notice::package.json not found yet — skipping checks until Phase 1 initializes Next.js."
          fi

      - name: Setup Node.js
        if: steps.check.outputs.initialized == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        if: steps.check.outputs.initialized == 'true'
        run: npm ci

      - name: Lint (ESLint)
        if: steps.check.outputs.initialized == 'true'
        run: npm run lint

      - name: Format check (Prettier)
        if: steps.check.outputs.initialized == 'true'
        run: npm run format:check

      - name: Type check (tsc --noEmit)
        if: steps.check.outputs.initialized == 'true'
        run: npm run typecheck

      - name: Build (next build)
        if: steps.check.outputs.initialized == 'true'
        run: npm run build
